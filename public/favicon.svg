<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Élő Víz favicon</title>
  <desc id="desc">Open Bible with a central cross and a living-water wave.</desc>
  <defs>
    <linearGradient id="bg" x1="10" x2="54" y1="8" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6f432b" />
      <stop offset="1" stop-color="#3f2416" />
    </linearGradient>
    <linearGradient id="pageLeft" x1="14" x2="30" y1="20" y2="47" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffaf2" />
      <stop offset="1" stop-color="#ebd6b3" />
    </linearGradient>
    <linearGradient id="pageRight" x1="34" x2="50" y1="20" y2="47" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7ec" />
      <stop offset="1" stop-color="#e4caa4" />
    </linearGradient>
    <linearGradient id="water" x1="24" x2="40" y1="21" y2="43" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#86e4eb" />
      <stop offset="1" stop-color="#2d8ca1" />
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)" />
  <circle cx="32" cy="18" r="18" fill="#fff7ec" opacity=".06" />

  <path
    d="M12 19c7 0 12.4 2.2 18 6.7v21.3c-4.7-3.7-10.5-5.7-18-5.7z"
    fill="url(#pageLeft)"
    stroke="#d8b587"
    stroke-linejoin="round"
    stroke-width="1.5"
  />
  <path
    d="M52 19c-7 0-12.4 2.2-18 6.7v21.3c4.7-3.7 10.5-5.7 18-5.7z"
    fill="url(#pageRight)"
    stroke="#d8b587"
    stroke-linejoin="round"
    stroke-width="1.5"
  />
  <path d="M32 25.5v19.2" fill="none" stroke="#cda26d" stroke-linecap="round" stroke-width="1.4" />

  <path
    d="M32 22.2v10.8M27.3 27.4h9.4"
    fill="none"
    stroke="url(#water)"
    stroke-linecap="round"
    stroke-width="3.8"
  />
  <path
    d="M22.4 40.8c2.1 2.1 4.4 2.1 6.7 0s4.5-2.1 6.7 0 4.6 2.1 6.8 0"
    fill="none"
    stroke="url(#water)"
    stroke-linecap="round"
    stroke-width="3.8"
  />
  <path
    d="M31.5 23c-.8 3.9-1 7.9-.7 12"
